  <ellipse cx="600" cy="100" rx="520" ry="140" fill="url(#orb)"/>
  <g opacity="0.14" stroke="#c084fc" stroke-width="1" fill="none">
    <path d="M0 44h1200M0 88h1200M0 132h1200M0 176h1200"/>
    <path d="M100 0v220M300 0v220M500 0v220M700 0v220M900 0v220M1100 0v220"/>

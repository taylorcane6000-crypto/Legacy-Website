# Install on the VPS (Debian/Ubuntu style):
#   sudo cp deploy/nginx-legacyrce.com.conf /etc/nginx/sites-available/legacyrce.com
#   sudo ln -sf /etc/nginx/sites-available/legacyrce.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Node must be running and listening on 127.0.0.1:5059 (match PORT in .env).
#
# HTTPS: after HTTP works, run:
#   sudo certbot --nginx -d legacyrce.com -d www.legacyrce.com
# Certbot will add ssl server blocks and can redirect HTTP→HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name legacyrce.com www.legacyrce.com;

    location / {
        proxy_pass http://127.0.0.1:5059;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
